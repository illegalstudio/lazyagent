version: 2

before:
  hooks:
    - npm install --prefix frontend
    - npm run build --prefix frontend
    - cp -r frontend/dist internal/assets/dist

builds:
  # macOS: full build with tray support (CGo required by Wails)
  - id: darwin
    main: .
    binary: lazyagent
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

  # Linux: TUI only, no tray (Wails excluded via build tag)
  - id: linux
    main: .
    binary: lazyagent
    env:
      - CGO_ENABLED=0
    tags:
      - notray
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    files:
      - README.md
      - LICENSE

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - repository:
      owner: illegalstudio
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/illegalstudio/lazyagent
    description: A lazy TUI for monitoring Claude Code agent sessions
