version: 2

before:
  hooks:
    - npm install --prefix frontend
    - npm run build --prefix frontend
    - cp -r frontend/dist internal/assets/dist

builds:
  # macOS: full build with GUI support (runs on macos-latest runner)
  - id: darwin
    main: .
    binary: lazyagent
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w
      - -X github.com/illegalstudio/lazyagent/internal/version.Version={{.Version}}
      - -X github.com/illegalstudio/lazyagent/internal/version.Commit={{.ShortCommit}}
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    hooks:
      post:
        - scripts/codesign.sh {{ .Path }}

  # Linux: TUI only, no GUI (no CGo needed)
  - id: linux
    main: .
    binary: lazyagent
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/illegalstudio/lazyagent/internal/version.Version={{.Version}}
      - -X github.com/illegalstudio/lazyagent/internal/version.Commit={{.ShortCommit}}
    tags:
      - notray
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    files:
      - README.md
      - LICENSE

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - repository:
      owner: illegalstudio
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/illegalstudio/lazyagent
    description: A lazy TUI for monitoring Claude Code agent sessions
